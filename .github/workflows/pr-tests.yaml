name: Pull Request Tests

on:
  pull_request:
     types: [opened, synchronize, reopened, ready_for_review]
     branches:
        - master
     paths:
       - '**.h'
       - '**.C'
       - '**.c'
       - '**.cmake'
       - '**CMakeLists.txt'
       - 'tests/*'
  workflow_dispatch:

jobs:
  pr-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: ['fedora-43']
        compiler: ['gcc']
    permissions:
      packages: read
    container:
      image: ghcr.io/dyninst/amd64/${{ matrix.os }}-base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    name: PR tests (${{ matrix.os }}, ${{ matrix.compiler }})
    steps:
      - name: Checkout Dyninst
        uses: actions/checkout@v4
        with:
          path: "src"  # relative to ${GITHUB_WORKSPACE}

      - name: Build Dyninst
        uses: ./src/.github/actions/build
        with:
          os: ${{ matrix.os }}
          compiler: ${{ matrix.compiler }}
          src-dir: "${GITHUB_WORKSPACE}/src"
          install-dir: "${GITHUB_WORKSPACE}/dyninstInstall/install"
          tests: "REGRESSION"
