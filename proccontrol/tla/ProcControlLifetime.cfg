\* Pool/impl lifecycle model.  All knobs off: TLC must report NO deadlock,
\* all invariants hold, Reclaimed satisfied.  Flip one knob TRUE to
\* reproduce each failure class: BUGL1/BUGL4 -> NoUAF violation,
\* BUGL2 -> SeverBeforeFree violation, BUGL3 -> deadlock (never reclaimed).
SPECIFICATION Spec
INVARIANT NoUAF
INVARIANT SeverBeforeFree
INVARIANT PublishBeforeSever
INVARIANT ExitReadSafe
INVARIANT WrapperLastOut
INVARIANT LockInWrapper
INVARIANT RefsBound
PROPERTY Reclaimed
CONSTANTS
  BUGL1_UnlockedUserDeref = FALSE
  BUGL2_FreeBeforeSever = FALSE
  BUGL3_PoolRefLeak = FALSE
  BUGL4_GenDecodeNoProcLock = FALSE
