\* Current design (all knobs off): TLC must report NO deadlock, all
\* invariants hold, and Termination is satisfied.  Flip one knob TRUE to
\* reproduce each historical failure -- TLC must then report a deadlock
\* (BUG1/2/5/8) or an invariant violation / deadlock (BUG3).
SPECIFICATION Spec
INVARIANT LockInv
INVARIANT NoParkWhileHoldingProcLock
INVARIANT NoProcControlLockAcrossCallback
INVARIANT OneCallbackAtATime
PROPERTY Termination
CONSTANTS
  BUG1_GenHoldsRegLockAcrossDecode = FALSE
  BUG2_NoLookupBarrier = FALSE
  BUG3_MallocHoldsProcLock = FALSE
  BUG5_PlumbingTakesProcLock = FALSE
  BUG8_CallbackUnderWorkLock = FALSE
